<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CI/CD Pipeline Monitoring</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
height:100vh;
font-family:Inter, sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b,#020617);
color:white;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

/* container */

.container{
text-align:center;
max-width:700px;
padding:40px;
}

/* title */

h1{
font-size:64px;
font-weight:700;
letter-spacing:-1px;
margin-bottom:10px;
}

/* subtitle */

h2{
font-weight:400;
color:#94a3b8;
margin-bottom:30px;
}

/* description */

p{
font-size:17px;
line-height:1.7;
color:#cbd5e1;
}

/* button */

.button{
margin-top:40px;
padding:14px 32px;
font-size:16px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
cursor:pointer;
transition:0.25s;
}

.button:hover{
transform:translateY(-2px);
background:#2563eb;
}

/* meteors */

.meteor{
position:absolute;
width:2px;
height:100px;
background:linear-gradient(white,transparent);
opacity:.6;
transform:rotate(45deg);
animation:fall linear infinite;
}

@keyframes fall{
0%{
transform:translateY(-200px) translateX(0) rotate(45deg);
opacity:1;
}
100%{
transform:translateY(120vh) translateX(400px) rotate(45deg);
opacity:0;
}
}

/* footer */

footer{
position:absolute;
bottom:20px;
font-size:13px;
color:#64748b;
}

</style>
</head>

<body>

<div class="container">

<h1>Welcome</h1>

<h2>CI/CD Pipeline Monitoring</h2>

<p>
Monitor your build and deployment pipelines from a single place.
Track pipeline activity, observe deployment status, and ensure
your delivery workflow operates smoothly and reliably.
</p>

<button class="button">
Enter Dashboard
</button>

</div>

<footer>
Continuous Integration • Continuous Delivery
</footer>

<script>

function meteor(){
const m=document.createElement("div")
m.className="meteor"
m.style.left=Math.random()*window.innerWidth+"px"
m.style.animationDuration=(Math.random()*2+1)+"s"
document.body.appendChild(m)
setTimeout(()=>m.remove(),3000)
}

setInterval(meteor,700)

</script>

</body>
</html>
